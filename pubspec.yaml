name: premflix
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  cached_network_image: ^3.4.1
  device_info_plus: ^13.2.0
  dio: ^5.10.0
  flutter:
    sdk: flutter
  flutter_cache_manager: ^3.4.2
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  go_router: ^17.3.0
  google_fonts: ^8.2.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  media_kit: ^1.2.6
  media_kit_libs_video: ^1.0.7
  media_kit_video: ^2.0.1
  multicast_dns: ^0.3.3+1
  package_info_plus: ^10.2.1
  path_provider: ^2.1.6
  window_manager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  msix: ^3.16.9

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

# Generates Android launcher icons from the brand mark.
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  image_path: assets/logo.png
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: assets/logo.png

# Packages the Windows build as an installable .msix.
# Run: dart run msix:create
msix_config:
  display_name: PremFlix
  publisher_display_name: PremFlix
  identity_name: com.premflix.premflix
  msix_version: 1.0.0.0
  logo_path: assets/logo.png
  capabilities: internetClient
